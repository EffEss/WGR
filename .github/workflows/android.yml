name: Android
on:
  push:
    paths: ['android/**', 'Assets/radar-map.html', 'Assets/us-states.geo.json', 'Assets/appicon_drizzle_1024.png']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Copy shared assets into the Android project
      - name: Sync shared assets
        run: |
          mkdir -p app/src/main/assets
          cp ../Assets/radar-map.html app/src/main/assets/
          cp ../Assets/us-states.geo.json app/src/main/assets/

      # Generate adaptive icon PNGs from appicon_drizzle_1024.png (transparent, for Android)
      - name: Generate launcher icons
        run: |
          pip install --quiet Pillow
          python -c "
          from PIL import Image
          import os
          src = Image.open('../Assets/appicon_drizzle_1024.png').convert('RGBA')
          for dpi, s in {'xxxhdpi':192,'xxhdpi':144,'xhdpi':96,'hdpi':72,'mdpi':48}.items():
              d = f'app/src/main/res/mipmap-{dpi}'
              os.makedirs(d, exist_ok=True)
              src.resize((s,s), Image.LANCZOS).save(f'{d}/ic_launcher_foreground.png')
          "

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode Play keystore (optional)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/release-keystore.jks
          fi

      - name: Build Android artifacts
        env:
          ANDROID_KEYSTORE_PATH: app/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          gradle assembleRelease bundleRelease --no-daemon

      - name: Rename artifacts
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/Drizzle_v${VERSION}.apk
          fi
          if [ -f app/build/outputs/bundle/release/app-release.aab ]; then
            mv app/build/outputs/bundle/release/app-release.aab app/build/outputs/bundle/release/Drizzle_v${VERSION}.aab
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: drizzle-android
          path: |
            android/app/build/outputs/apk/release/Drizzle_v*.apk
            android/app/build/outputs/bundle/release/Drizzle_v*.aab
