name: Garmin

on:
  push:
    paths:
      - 'garmin/**'
      - '.github/workflows/garmin.yml'
  workflow_dispatch:

# Self-hosted only. This job expects a runner labelled [self-hosted, garmin] that
# already has a Connect IQ SDK + the venux1/d2mach2 device definitions installed
# under a valid Garmin developer account. Nothing about any contributor's local
# machine (paths, usernames, storage) is referenced or stored here - the runner
# advertises its own SDK location via the CIQ_HOME environment variable.
jobs:
  build:
    runs-on: [self-hosted, garmin]
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Guard against committed Program Materials
        run: |
          set -euo pipefail
          # Fail fast if Garmin-licensed device definitions were ever committed.
          # These files (e.g. *.bin device images, *.api.debug.xml, device folders)
          # are Garmin "Program Materials" and must not be redistributed in the repo.
          OFFENDERS=$(git ls-files -- 'garmin/**/*.bin' 'garmin/**/*.api.debug.xml' 'garmin/ci/devices/**' 'garmin/devices/**' || true)
          if [ -n "${OFFENDERS}" ]; then
            echo "Garmin Program Materials detected in version control:"
            echo "${OFFENDERS}"
            echo "These are licensed by Garmin and must not be committed/redistributed."
            echo "Remove them with 'git rm -r --cached' and rely on the runner's own"
            echo "SDK + device installation instead."
            exit 1
          fi
          echo "No committed Garmin Program Materials found."

      - name: Resolve Connect IQ toolchain
        run: |
          set -euo pipefail
          # The runner must expose its SDK via CIQ_HOME (set in the runner's own
          # environment, not in this repo). No local path is ever hard-coded.
          if [ -z "${CIQ_HOME:-}" ]; then
            echo "CIQ_HOME is not set on this self-hosted runner."
            echo "Point CIQ_HOME at the Connect IQ SDK root (the folder containing bin/monkeyc)."
            exit 1
          fi

          MONKEYC="${CIQ_HOME}/bin/monkeyc"
          if [ ! -x "${MONKEYC}" ]; then
            echo "monkeyc not found or not executable at: ${MONKEYC}"
            echo "Verify CIQ_HOME points at a valid Connect IQ SDK."
            exit 1
          fi

          echo "MONKEYC=${MONKEYC}" >> "$GITHUB_ENV"
          "${MONKEYC}" --version

      - name: Verify device definitions
        run: |
          set -euo pipefail
          # Devices are provided by the runner's own Garmin developer installation.
          DEV_DIR="${CIQ_DEVICES_DIR:-$HOME/.Garmin/ConnectIQ/Devices}"
          for d in venux1 d2mach2; do
            if [ ! -d "${DEV_DIR}/${d}" ]; then
              echo "Device definition '${d}' is not installed on this runner."
              echo "Use the Connect IQ SDK Manager (signed in to your developer account)"
              echo "to download venux1 and d2mach2, then re-run."
              exit 1
            fi
          done
          echo "Device definitions present: venux1, d2mach2"

      - name: Materialize Garmin developer key
        env:
          GARMIN_DEV_KEY_DER_BASE64: ${{ secrets.GARMIN_DEV_KEY_DER_BASE64 }}
        run: |
          if [ -z "${GARMIN_DEV_KEY_DER_BASE64}" ]; then
            echo "Missing secret GARMIN_DEV_KEY_DER_BASE64 (base64-encoded .der key)."
            exit 1
          fi

          mkdir -p garmin
          echo "${GARMIN_DEV_KEY_DER_BASE64}" | base64 --decode > garmin/ci-dev-key.der
          test -s garmin/ci-dev-key.der

      - name: Build Garmin IQ and PRG artifacts
        working-directory: garmin
        run: |
          set -euo pipefail
          mkdir -p bin

          # Store package (.iq): -e exports a Connect IQ Store bundle for every
          # product listed in manifest.xml (venux1 + d2mach2).
          "$MONKEYC" -e -f monkey.jungle -o bin/Drizzle.iq -y ci-dev-key.der

          # Per-device side-load packages (.prg).
          "$MONKEYC" -f monkey.jungle -o bin/DRZLX1.prg -y ci-dev-key.der -d venux1
          "$MONKEYC" -f monkey.jungle -o bin/DRZLD2.prg -y ci-dev-key.der -d d2mach2

          test -f bin/Drizzle.iq
          test -f bin/DRZLX1.prg
          test -f bin/DRZLD2.prg

      - name: Upload Garmin artifacts
        uses: actions/upload-artifact@v5
        with:
          name: drizzle-garmin
          path: |
            garmin/bin/Drizzle.iq
            garmin/bin/DRZLX1.prg
            garmin/bin/DRZLX1.prg.debug.xml
            garmin/bin/DRZLD2.prg
            garmin/bin/DRZLD2.prg.debug.xml

      - name: Cleanup key material
        if: always()
        run: rm -f garmin/ci-dev-key.der
