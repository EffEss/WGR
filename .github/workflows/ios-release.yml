name: iOS Release

# Signed build + upload of iDrizzle (iOS) and iDrizzleWatch (watchOS) to
# App Store Connect / TestFlight. Runs on a version tag (e.g. v2.1.0) or
# manually via the Actions tab. Requires the repository secrets listed in
# the README "Publishing to the App Store" section.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-26
    env:
      TEAM_ID: ${{ secrets.DRIZZLE_DEVELOPMENT_TEAM }}
      ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
      # Numeric Apple ID (ADAM ID) of the standalone iDrizzleWatch App Store
      # Connect record. altool --upload-package needs it because a watch-only
      # bundle cannot be classified by --upload-app's plist inference.
      WATCH_APPLE_ID: ${{ secrets.ASC_WATCH_APPLE_ID }}
      # Manual distribution signing material. The same Apple Distribution
      # certificate signs both apps; each app has its own App Store profile.
      # Automatic signing is unusable here: a clean CI runner has no signing
      # identity, so Xcode tries to mint a brand-new distribution certificate
      # every run and quickly hits Apple's certificate limit.
      DIST_CERT_P12_BASE64: ${{ secrets.WATCH_DIST_CERT_P12_BASE64 }}
      DIST_CERT_PASSWORD: ${{ secrets.WATCH_DIST_CERT_PASSWORD }}
      IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
      IOS_PROVISION_PROFILE_NAME: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
      WATCH_PROVISION_PROFILE_BASE64: ${{ secrets.WATCH_PROVISION_PROFILE_BASE64 }}
      WATCH_PROVISION_PROFILE_NAME: ${{ secrets.WATCH_PROVISION_PROFILE_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy app icons
        run: |
          cp Assets/iDrizzle.png ios/iDrizzle/AppIcon.png
          cp Assets/iDrizzle.png ios/iDrizzleWatch/AppIcon.png
          cp Assets/iDrizzle.png ios/iDrizzle/Assets.xcassets/AppIcon.appiconset/AppIcon.png
          cp Assets/iDrizzle.png ios/iDrizzleWatch/Assets.xcassets/AppIcon.appiconset/AppIcon.png

      # Both Xcode projects reference ios/Local.xcconfig as a base config; it is
      # gitignored, so recreate it on the runner with the Team ID from secrets.
      - name: Prepare Local.xcconfig
        run: |
          cp ios/Local.xcconfig.template ios/Local.xcconfig
          /usr/bin/sed -i '' "s/^DRIZZLE_DEVELOPMENT_TEAM =.*/DRIZZLE_DEVELOPMENT_TEAM = ${TEAM_ID}/" ios/Local.xcconfig

      # Write the App Store Connect API key (.p8) from the base64 secret so
      # xcodebuild can authenticate for both signing and upload.
      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_API_KEY_P8_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      # Import the distribution certificate into a temporary keychain and
      # install BOTH App Store provisioning profiles (iOS + watch). Manual
      # signing with a fixed certificate avoids automatic signing's habit of
      # creating a new distribution certificate on every CI run (which hits
      # Apple's certificate limit: "Choose a certificate to revoke").
      - name: Set up distribution signing
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/dist-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"

          echo "${DIST_CERT_P12_BASE64}" | base64 --decode > "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -P "${DIST_CERT_PASSWORD}" \
            -A -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}" >/dev/null
          # Make the temp keychain searchable alongside the login keychain.
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | tr -d '"')

          # Install both App Store provisioning profiles where Xcode looks.
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${IOS_PROVISION_PROFILE_BASE64}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/iDrizzle_ios.mobileprovision
          echo "${WATCH_PROVISION_PROFILE_BASE64}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/iDrizzle_watch.mobileprovision

          # Expose the keychain to later steps so archives can unlock it.
          echo "SIGN_KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"
          echo "SIGN_KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> "$GITHUB_ENV"

      # Substitute the Team ID and the iOS profile name into the export plist.
      - name: Inject Team ID into export options
        run: |
          /usr/libexec/PlistBuddy -c "Set :teamID ${TEAM_ID}" ios/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Set :provisioningProfiles:com.idrizzle.app ${IOS_PROVISION_PROFILE_NAME}" ios/ExportOptions.plist

      # ---- iDrizzle (iOS) ----
      - name: Archive iDrizzle (iOS)
        run: |
          # Manual signing with the supplied distribution cert + App Store
          # profile. Automatic signing is avoided so CI never tries to create
          # a new distribution certificate.
          security unlock-keychain -p "${SIGN_KEYCHAIN_PASSWORD}" "${SIGN_KEYCHAIN_PATH}"
          xcodebuild -project ios/iDrizzle.xcodeproj \
            -scheme iDrizzle \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/iDrizzle.xcarchive \
            OTHER_CODE_SIGN_FLAGS="--keychain ${SIGN_KEYCHAIN_PATH}" \
            DEVELOPMENT_TEAM="${TEAM_ID}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${IOS_PROVISION_PROFILE_NAME}" \
            archive

      - name: Upload iDrizzle to App Store Connect
        run: |
          security unlock-keychain -p "${SIGN_KEYCHAIN_PASSWORD}" "${SIGN_KEYCHAIN_PATH}"
          set +e
          OUTPUT=$(xcodebuild -exportArchive \
            -archivePath build/iDrizzle.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/iDrizzle-export \
            OTHER_CODE_SIGN_FLAGS="--keychain ${SIGN_KEYCHAIN_PATH}" \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}" 2>&1)
          STATUS=$?
          echo "${OUTPUT}"
          if [ ${STATUS} -ne 0 ]; then
            # Tolerate re-runs where this exact build was already uploaded so the
            # job can proceed to the watch upload step. Any other failure is fatal.
            if echo "${OUTPUT}" | grep -q "bundle version must be higher than the previously uploaded version"; then
              echo "iDrizzle build already uploaded — continuing to watch upload."
            else
              exit ${STATUS}
            fi
          fi

      # ---- iDrizzleWatch (watchOS) ----
      # A standalone watchOS archive cannot be exported to the App Store by
      # xcodebuild -exportArchive (it only offers ad-hoc/enterprise/development
      # methods), so the archive must be DISTRIBUTION-signed up front via manual
      # signing using the shared keychain and the watch App Store profile that
      # the "Set up distribution signing" step already prepared.
      - name: Archive iDrizzleWatch (watchOS)
        run: |
          # Manual distribution signing: the archive must already carry the
          # App Store distribution certificate + profile because the watch
          # archive cannot be re-signed for the store by -exportArchive.
          # -allowProvisioningUpdates is intentionally omitted so xcodebuild
          # uses exactly the supplied profile instead of trying to manage one.
          security unlock-keychain -p "${SIGN_KEYCHAIN_PASSWORD}" "${SIGN_KEYCHAIN_PATH}"
          xcodebuild -project ios/iDrizzleWatch.xcodeproj \
            -scheme iDrizzleWatch \
            -configuration Release \
            -destination 'generic/platform=watchOS' \
            -archivePath build/iDrizzleWatch.xcarchive \
            OTHER_CODE_SIGN_FLAGS="--keychain ${SIGN_KEYCHAIN_PATH}" \
            DEVELOPMENT_TEAM="${TEAM_ID}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${WATCH_PROVISION_PROFILE_NAME}" \
            archive

      - name: Upload iDrizzleWatch to App Store Connect
        run: |
          # The archive is already distribution-signed (manual signing in the
          # archive step), so no -exportArchive re-sign is needed — and it isn't
          # even possible: xcodebuild -exportArchive refuses the app-store-connect
          # method for standalone watchOS archives ("method expected
          # {release-testing, enterprise, debugging}"). So just wrap the signed
          # .app into an IPA and upload it.
          #
          # altool --upload-app infers the platform from the bundle and cannot
          # classify a watch-only bundle (CFBundleSupportedPlatforms=[WatchOS]),
          # so use --upload-package with explicit --type ios + metadata. The
          # standalone watch app lives under the iOS platform in App Store Connect.
          APP_PATH="build/iDrizzleWatch.xcarchive/Products/Applications/iDrizzleWatch.app"

          rm -rf build/iDrizzleWatch-ipa
          mkdir -p build/iDrizzleWatch-ipa/Payload
          cp -R "${APP_PATH}" build/iDrizzleWatch-ipa/Payload/
          (cd build/iDrizzleWatch-ipa && /usr/bin/zip -r -y ../iDrizzleWatch.ipa Payload >/dev/null)

          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "${APP_PATH}/Info.plist")
          BUNDLE_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "${APP_PATH}/Info.plist")
          SHORT_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "${APP_PATH}/Info.plist")
          xcrun altool --upload-package build/iDrizzleWatch.ipa \
            --type ios \
            --apple-id "${WATCH_APPLE_ID}" \
            --bundle-id "${BUNDLE_ID}" \
            --bundle-version "${BUNDLE_VERSION}" \
            --bundle-short-version-string "${SHORT_VERSION}" \
            --apiKey "${ASC_KEY_ID}" \
            --apiIssuer "${ASC_ISSUER_ID}"

      - name: Clean up API key
        if: always()
        run: rm -f ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
