name: iOS Release

# Signed build + upload of iDrizzle (iOS) with its embedded iDrizzleWatch
# (watchOS) companion to App Store Connect / TestFlight. The watch app is an
# independent watch-only app (WKWatchOnly) that ships inside the iOS app's
# archive, so a single archive + single upload delivers both. Runs on a version
# tag (e.g. v2.1.0) or manually via the Actions tab. Requires the repository
# secrets listed in docs/PUBLISHING.md.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-26
    env:
      TEAM_ID: ${{ secrets.DRIZZLE_DEVELOPMENT_TEAM }}
      ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
      # Distribution signing material. The Apple Distribution certificate is
      # imported into a temporary keychain so xcodebuild reuses it instead of
      # minting a brand-new distribution certificate on every CI run (which
      # quickly hits Apple's certificate limit). With the cert present,
      # automatic signing + -allowProvisioningUpdates lets Xcode manage the App
      # Store profiles for BOTH the iOS app and the embedded watch target.
      DIST_CERT_P12_BASE64: ${{ secrets.WATCH_DIST_CERT_P12_BASE64 }}
      DIST_CERT_PASSWORD: ${{ secrets.WATCH_DIST_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      # The iDrizzle project references ios/Local.xcconfig as a base config for
      # every target (it supplies DRIZZLE_DEVELOPMENT_TEAM). It is gitignored, so
      # recreate it on the runner with the Team ID from secrets.
      - name: Prepare Local.xcconfig
        run: |
          cp ios/Local.xcconfig.template ios/Local.xcconfig
          /usr/bin/sed -i '' "s/^DRIZZLE_DEVELOPMENT_TEAM =.*/DRIZZLE_DEVELOPMENT_TEAM = ${TEAM_ID}/" ios/Local.xcconfig

      # Write the App Store Connect API key (.p8) from the base64 secret so
      # xcodebuild can authenticate for signing, profile management and upload.
      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_API_KEY_P8_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      # Import the distribution certificate into a temporary keychain. A clean CI
      # runner has no signing identity, so without this Xcode would try to create
      # a new distribution certificate on every run and hit Apple's certificate
      # limit ("Choose a certificate to revoke"). With the cert present, Xcode
      # reuses it and only manages provisioning profiles.
      - name: Set up distribution signing
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/dist-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"

          echo "${DIST_CERT_P12_BASE64}" | base64 --decode > "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -P "${DIST_CERT_PASSWORD}" \
            -A -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}" >/dev/null
          # Make the temp keychain searchable alongside the login keychain.
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | tr -d '"')

          # Expose the keychain to later steps so archives can unlock it.
          echo "SIGN_KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"
          echo "SIGN_KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> "$GITHUB_ENV"

      # Substitute the Team ID into the export options plist.
      - name: Inject Team ID into export options
        run: |
          /usr/libexec/PlistBuddy -c "Set :teamID ${TEAM_ID}" ios/ExportOptions.plist

      # ---- iDrizzle (iOS + embedded watch) ----
      # Archiving the iDrizzle scheme builds the iOS app AND its embedded
      # iDrizzleWatch Watch App (via the "Embed Watch Content" phase), so a
      # single archive contains both. Automatic signing reuses the imported
      # distribution certificate; -allowProvisioningUpdates lets Xcode fetch or
      # create the App Store profiles for com.idrizzle.app and
      # com.idrizzle.app.watchkitapp.
      - name: Archive iDrizzle (iOS + watch)
        run: |
          security unlock-keychain -p "${SIGN_KEYCHAIN_PASSWORD}" "${SIGN_KEYCHAIN_PATH}"
          xcodebuild -project ios/iDrizzle.xcodeproj \
            -scheme iDrizzle \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/iDrizzle.xcarchive \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
            -allowProvisioningUpdates \
            OTHER_CODE_SIGN_FLAGS="--keychain ${SIGN_KEYCHAIN_PATH}" \
            DEVELOPMENT_TEAM="${TEAM_ID}" \
            archive

      - name: Upload iDrizzle to App Store Connect
        run: |
          security unlock-keychain -p "${SIGN_KEYCHAIN_PASSWORD}" "${SIGN_KEYCHAIN_PATH}"
          set +e
          OUTPUT=$(xcodebuild -exportArchive \
            -archivePath build/iDrizzle.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/iDrizzle-export \
            -allowProvisioningUpdates \
            OTHER_CODE_SIGN_FLAGS="--keychain ${SIGN_KEYCHAIN_PATH}" \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}" 2>&1)
          STATUS=$?
          echo "${OUTPUT}"
          if [ ${STATUS} -ne 0 ]; then
            # Tolerate re-runs where this exact build was already uploaded.
            if echo "${OUTPUT}" | grep -q "bundle version must be higher than the previously uploaded version"; then
              echo "iDrizzle build already uploaded — nothing to do."
            else
              exit ${STATUS}
            fi
          fi

      - name: Clean up API key
        if: always()
        run: rm -f ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
