name: iOS
on:
  push:
    paths: ['ios/**', 'Assets/radar-map.html', 'Assets/us-states.geo.json', 'Assets/iDrizzle.png']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Copy icon as a loose bundle resource (avoids .car duplication)
      - name: Copy app icon
        run: |
          cp Assets/iDrizzle.png ios/iDrizzle/AppIcon.png
          cp Assets/iDrizzle.png ios/iDrizzleWatch/AppIcon.png
          cp Assets/iDrizzle.png ios/iDrizzle/Assets.xcassets/AppIcon.appiconset/AppIcon.png
          cp Assets/iDrizzle.png ios/iDrizzleWatch/Assets.xcassets/AppIcon.appiconset/AppIcon.png

      # Ensure gitignored local signing config exists for Xcode build settings
      - name: Prepare Local.xcconfig for CI
        run: |
          if [ ! -f ios/Local.xcconfig ]; then
            cp ios/Local.xcconfig.template ios/Local.xcconfig
          fi

      - name: Build
        run: |
          xcodebuild -project ios/iDrizzle.xcodeproj \
            -scheme iDrizzle \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/iDrizzle.xcarchive \
            DRIZZLE_DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Build watchOS app
        run: |
          xcodebuild -project ios/iDrizzleWatch.xcodeproj \
            -scheme iDrizzleWatch \
            -configuration Release \
            -sdk watchos \
            -archivePath build/iDrizzleWatch.xcarchive \
            DRIZZLE_DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - uses: actions/upload-artifact@v4
        with:
          name: idrizzle-ios
          path: build/iDrizzle.xcarchive

      - uses: actions/upload-artifact@v4
        with:
          name: idrizzle-watchos
          path: build/iDrizzleWatch.xcarchive
