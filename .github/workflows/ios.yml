name: iOS
on:
  push:
    paths: ['ios/**', 'Assets/radar-map.html', 'Assets/us-states.geo.json', 'Assets/iDrizzle.png']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Copy icon as a loose bundle resource (avoids .car duplication)
      - name: Copy app icon
        run: cp Assets/iDrizzle.png ios/Drizzle/AppIcon.png

      # Ensure gitignored local signing config exists for Xcode build settings
      - name: Prepare Local.xcconfig for CI
        run: |
          if [ ! -f ios/Local.xcconfig ]; then
            cp ios/Local.xcconfig.template ios/Local.xcconfig
          fi

      - name: Build
        run: |
          xcodebuild -project ios/Drizzle.xcodeproj \
            -scheme Drizzle \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Drizzle.xcarchive \
            DRIZZLE_DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - uses: actions/upload-artifact@v4
        with:
          name: drizzle-ios
          path: build/Drizzle.xcarchive
