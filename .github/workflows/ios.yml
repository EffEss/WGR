name: iOS
on:
  push:
    paths: ['ios/**', 'Assets/radar-map.html', 'Assets/us-states.geo.json', 'Assets/appicon_drizzle_1024_opaque.png']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      # Ensure gitignored local signing config exists for Xcode build settings
      - name: Prepare Local.xcconfig for CI
        run: |
          if [ ! -f ios/Local.xcconfig ]; then
            cp ios/Local.xcconfig.template ios/Local.xcconfig
          fi

      # Archiving the iDrizzle scheme also builds the embedded iDrizzleWatch
      # Watch App (via the "Embed Watch Content" phase), so this single build
      # validates both the iOS app and the watch app.
      - name: Build
        run: |
          xcodebuild -project ios/iDrizzle.xcodeproj \
            -scheme iDrizzle \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/iDrizzle.xcarchive \
            DRIZZLE_DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - uses: actions/upload-artifact@v4
        with:
          name: idrizzle-ios
          path: build/iDrizzle.xcarchive
